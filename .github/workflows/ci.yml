name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r backend/requirements.txt
      - name: Lint
        run: ruff check backend
      - name: Type-check
        run: mypy backend/app --ignore-missing-imports
      - name: Test
        run: pytest backend/tests -q --cov=backend/app --cov-report=term-missing
      - name: Dep audit
        run: pip-audit -r backend/requirements.txt || true

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=high || true

  parsers:
    name: Parser golden-fixture tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - run: pytest backend/tests/integration -k parser -q
