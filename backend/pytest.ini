[pytest]
# Auto-mode for pytest-asyncio so every `async def` test runs without a
# per-test marker. The conftest hook is a defensive belt-and-suspenders.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quiet; force colour off in CI for readable logs.
addopts =
    -q
    --strict-markers
    --tb=short

markers =
    integration: hits the FastAPI app via httpx ASGI transport
    unit: pure-function or single-class unit
    slow: takes >1s — exclude in dev loop via `-m "not slow"`
