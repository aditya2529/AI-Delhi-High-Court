# Delhi HC Case Tracker — local dev compose. Production deploy lives separately.
#
#   docker compose -f infrastructure/docker-compose.yml up --build
#
# Brings up: backend (FastAPI on 8000), frontend (Next.js on 3000), redis (optional).
# SQLite file lives on a host-mounted volume so data survives container restarts.

services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: dhc-backend
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend/data:/app/backend/data
      - ../logs/backend:/app/logs/backend
      - ../parsers/fixtures:/app/parsers/fixtures:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: dhc-frontend
    # NEXT_PUBLIC_* values are inlined into the bundle at build time. We
    # mirror frontend/.env.local here so docker-compose stays in sync with
    # the non-Docker dev flow. NEXT_PUBLIC_CLIENT_MODE gates the PRIVATE
    # ALPHA banner; defaults to "fake" if frontend/.env.local is absent.
    env_file:
      - ../frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dhc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
