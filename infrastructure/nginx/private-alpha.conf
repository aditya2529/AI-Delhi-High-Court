# Delhi HC Case Tracker — GREEN ZONE / PRIVATE ALPHA reverse-proxy.
#
# Default posture for any non-localhost deployment of this MVP. Requires
# HTTP basic auth on every public-facing path. The application's own
# `noindex, nofollow` meta tag + robots.txt are belt; this is braces.
#
# Setup (one-time):
#   1. Generate htpasswd file on the host:
#        htpasswd -cB /etc/nginx/dhc.htpasswd alpha-tester
#        (-c create new file; -B use bcrypt; prompts for password)
#      For additional testers (omit -c):
#        htpasswd -B /etc/nginx/dhc.htpasswd second-tester
#   2. Put TLS certs at /etc/nginx/ssl/{fullchain,privkey}.pem (use
#      Let's Encrypt via certbot — acme path is whitelisted below).
#   3. Drop this file into /etc/nginx/conf.d/ and reload:
#        nginx -t && systemctl reload nginx
#
# DEPLOY CHECKLIST (must all be true before any non-localhost serve):
#   * htpasswd file owner = nginx, mode 0640
#   * server_name set to the actual private alpha hostname (replace
#     'alpha.example.invalid' below)
#   * TLS terminating at port 443; HTTP 80 redirects (block at bottom)
#   * Backend reachable at 127.0.0.1:8000; Next.js at 127.0.0.1:3000
#   * Phase-0 gates G2 + G3 closed (or this server stays off the
#     internet entirely)
#
# Anti-footgun:
#   * `auth_basic` is set at the server scope so EVERY new location
#     block inherits it. Removing it requires an explicit `auth_basic off;`.
#   * `add_header X-Robots-Tag "noindex, nofollow, noarchive"` is also
#     server-scoped — defense in depth against accidental indexing.

# --- HTTP -> HTTPS redirect (no auth on /.well-known for ACME) -----------
server {
    listen      80;
    server_name alpha.example.invalid;   # REPLACE before deploy

    # Allow Let's Encrypt to renew without auth.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        auth_basic off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS — the private alpha server ------------------------------------
server {
    listen      443 ssl http2;
    server_name alpha.example.invalid;   # REPLACE before deploy

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # === GREEN-ZONE rails ===============================================
    # 1. Basic auth — every path. Inherited by all locations below.
    auth_basic           "Delhi HC Case Tracker — private alpha";
    auth_basic_user_file /etc/nginx/dhc.htpasswd;

    # 2. Belt-and-braces noindex (also set in frontend layout metadata).
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy
        "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # 3. Generous body limit for posted form (no file uploads in MVP).
    client_max_body_size 32k;

    # 4. Reasonable timeouts — court-side latency dominates.
    proxy_read_timeout    45s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    20s;

    # 5. Forward real client IP to backend so search_request.user_ip_hash
    #    is per-tester, not "always 127.0.0.1".
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Backend (FastAPI) -------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # --- Frontend (Next.js) ------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        # Next.js needs upgrade headers for HMR if you serve dev mode.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Health endpoint exposed WITHOUT auth so external uptime ----
    # --- monitors can poke it. Returns no PII; just status: ok. -----
    location = /api/v1/health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/v1/health;
    }
}
